<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abhi Chess Engine</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="container header">
    <a class="back-link" href="https://abhikhur27.github.io/" target="_blank" rel="noreferrer">Back to Portfolio</a>
    <h1>Abhi Chess Engine</h1>
    <p>Play, inspect game state, and run a browser engine with depth-controlled move search.</p>
  </header>

  <main class="container layout">
    <section class="panel board-panel">
      <div class="board-toolbar">
        <p id="status" class="status" aria-live="polite"></p>
      </div>
      <div id="board" class="board" aria-label="Chessboard"></div>
    </section>

    <aside class="panel side-panel">
      <h2>Controls</h2>
      <div class="button-row">
        <button id="undo" type="button">Undo</button>
        <button id="reset" type="button">Reset</button>
        <button id="flip" type="button">Flip Board</button>
      </div>

      <h2>Engine</h2>
      <label for="engine-side">Engine side</label>
      <select id="engine-side">
        <option value="b" selected>Black</option>
        <option value="w">White</option>
      </select>
      <label for="engine-depth">Search depth: <span id="engine-depth-label">2</span></label>
      <input id="engine-depth" type="range" min="1" max="3" value="2">
      <div class="button-row compact">
        <button id="engine-move" type="button">Engine Move</button>
      </div>
      <label class="inline-check"><input id="engine-auto" type="checkbox" checked> Auto reply after your move</label>
      <p id="engine-status" class="message" aria-live="polite"></p>

      <h2>Move List</h2>
      <ol id="move-list" class="move-list"></ol>

      <h2>Position Summary</h2>
      <div id="position-summary" class="position-summary"></div>

      <h2>FEN</h2>
      <textarea id="fen" rows="2" class="mono" readonly></textarea>
      <div class="button-row compact">
        <button id="copy-fen" type="button">Copy FEN</button>
      </div>

      <h2>Load FEN</h2>
      <textarea id="fen-input" rows="2" class="mono" placeholder="Paste a valid FEN and click Load"></textarea>
      <div class="button-row compact">
        <button id="load-fen" type="button">Load FEN</button>
      </div>

      <h2>PGN</h2>
      <textarea id="pgn" rows="5" class="mono" readonly></textarea>
      <div class="button-row compact">
        <button id="copy-pgn" type="button">Copy PGN</button>
      </div>

      <p id="message" class="message" aria-live="polite"></p>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
